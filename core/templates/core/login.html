<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - VolunTrack</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet"/>
    <style type="text/tailwindcss">
        /* Automatically styles Django's default form inputs to match Tailwind */
        input[type="text"], input[type="password"], input[type="email"] {
            @apply w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none transition-all text-slate-700 bg-slate-50 focus:bg-white;
        }
        label {
            @apply block text-sm font-semibold text-slate-700 mb-1 mt-4;
        }
        .helptext, ul.errorlist {
            @apply text-xs text-rose-500 mt-1;
        }
    </style>
</head>
<body class="bg-slate-100 flex items-center justify-center min-h-screen p-4 font-sans antialiased">

    <div class="max-w-md w-full bg-white rounded-2xl shadow-xl border border-slate-200 overflow-hidden">
        <div class="bg-indigo-600 p-6 text-center">
            <div class="h-12 w-12 rounded-full bg-white/20 mx-auto flex items-center justify-center mb-3">
                <i class="ri-user-received-2-line text-white text-2xl"></i>
            </div>
            <h2 class="text-2xl font-bold text-white">Welcome Back</h2>
            <p class="text-indigo-100 text-sm mt-1">Sign in to access your dashboard</p>
        </div>

        <div class="p-8">
            <form method="POST" action="{% url 'login' %}">
                {% csrf_token %}
                
                {{ form.as_p }}

                <button type="submit" class="w-full mt-8 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-lg shadow-md transition-all flex items-center justify-center gap-2">
                    <span>Sign In</span>
                    <i class="ri-arrow-right-line"></i>
                </button>
            </form>

            <p class="text-center text-sm text-slate-500 mt-6">
                Don't have an account? 
                <a href="{% url 'register_volunteer' %}" class="text-indigo-600 font-semibold hover:underline">Register here</a>
            </p>
        </div>
    </div>

</body>
</html>
