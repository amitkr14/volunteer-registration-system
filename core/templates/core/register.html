<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - VolunTrack</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet"/>
    <style type="text/tailwindcss">
        input[type="text"], input[type="password"], input[type="email"] {
            @apply w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 outline-none transition-all text-slate-700 bg-slate-50 focus:bg-white;
        }
        label {
            @apply block text-sm font-semibold text-slate-700 mb-1 mt-4;
        }
        .helptext {
            @apply text-xs text-slate-500 mt-1 block;
        }
        ul.errorlist {
            @apply text-xs text-rose-500 mt-1 bg-rose-50 p-2 rounded border border-rose-100;
        }
    </style>
</head>
<body class="bg-slate-100 flex items-center justify-center min-h-screen p-4 font-sans antialiased py-12">

    <div class="max-w-lg w-full bg-white rounded-2xl shadow-xl border border-slate-200 overflow-hidden">
        <div class="bg-emerald-600 p-6 text-center">
            <div class="h-12 w-12 rounded-full bg-white/20 mx-auto flex items-center justify-center mb-3">
                <i class="ri-team-line text-white text-2xl"></i>
            </div>
            <h2 class="text-2xl font-bold text-white">Join the Team</h2>
            <p class="text-emerald-100 text-sm mt-1">Register as a new volunteer</p>
        </div>

        <div class="p-8">
            <form method="POST" action="{% url 'register_volunteer' %}">
                {% csrf_token %}
                
                <div class="space-y-1">
                    {{ form.as_p }}
                </div>

                <button type="submit" class="w-full mt-8 bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 px-4 rounded-lg shadow-md transition-all flex items-center justify-center gap-2">
                    <i class="ri-user-add-line"></i>
                    <span>Create Account</span>
                </button>
            </form>

            <p class="text-center text-sm text-slate-500 mt-6">
                Already registered? 
                <a href="{% url 'login' %}" class="text-emerald-600 font-semibold hover:underline">Sign in here</a>
            </p>
        </div>
    </div>

</body>
</html>
